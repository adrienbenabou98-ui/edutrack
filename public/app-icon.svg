<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#4f46e5"/>

  <!-- Magnifying glass handle -->
  <line x1="310" y1="350" x2="450" y2="458" stroke="white" stroke-width="56" stroke-linecap="round"/>

  <!-- Magnifying glass ring -->
  <circle cx="200" cy="280" r="145" fill="none" stroke="white" stroke-width="52"/>

  <!-- Graduation cap board (mortar board) centered on lens -->
  <polygon points="200,96 400,162 200,228 0,162" fill="#fbbf24"/>

  <!-- Cap crown (the 3D top of the cap) -->
  <rect x="162" y="136" width="76" height="54" rx="8" fill="#f59e0b"/>

  <!-- Tassel cord -->
  <line x1="400" y1="162" x2="400" y2="242" stroke="#fbbf24" stroke-width="9"/>
  <!-- Tassel bob -->
  <circle cx="400" cy="260" r="18" fill="#fbbf24"/>
</svg>
